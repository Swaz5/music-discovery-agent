services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      # ChromaDB vector store — persists the RAG knowledge base between restarts
      - ./.chroma:/app/.chroma

      # Personalisation data — persists preference ratings between restarts
      - ./data/preferences.json:/app/data/preferences.json

      # Audio preview cache — avoids re-downloading Deezer previews
      - ./data/previews:/app/data/previews
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
